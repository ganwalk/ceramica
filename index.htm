<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerâmica Pro: Motor de Geometria</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clay: {
                            50: '#fbf8f6',
                            100: '#f5eee9',
                            200: '#eadad0',
                            300: '#d9beb0',
                            400: '#c59b87',
                            500: '#b68066',
                            600: '#a86a51',
                            700: '#8c5441',
                            800: '#734638',
                            900: '#5e3a30',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Estilos base da App */
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #fbf8f6; }
        
        /* Ocultar elementos de impressão na tela normal */
        .print-only { display: none; }

        /* Estilos de Impressão (Print CSS) Cruciais */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0; /* Margem controlada pelo CSS da página */
            }
            html, body {
                height: auto !important;
                width: auto !important;
                overflow: visible !important;
                display: block !important;
                margin: 0;
                padding: 0;
                background-color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            /* Esconder UI */
            .no-print { display: none !important; }
            /* Mostrar apenas área de impressão */
            .print-only { display: block !important; }

            .print-page {
                width: 21cm;
                height: 29.7cm;
                padding: 1cm;
                box-sizing: border-box;
                page-break-after: always;
                position: relative;
                background: white;
                overflow: hidden;
            }
            .print-page:last-child {
                page-break-after: auto;
            }
        }
    </style>
</head>
<body class="text-gray-800 h-screen overflow-hidden flex flex-col md:flex-row">

    <!-- SIDEBAR (Painel de Controlo) - Oculto na impressão -->
    <aside class="w-full md:w-80 bg-white border-r border-clay-200 flex flex-col h-full no-print shadow-lg z-10">
        <div class="p-6 border-b border-clay-100 bg-clay-50">
            <h1 class="text-2xl font-bold text-clay-800 flex items-center gap-2">
                <i class="ph ph-intersect text-3xl text-clay-600"></i>
                Cerâmica Pro
            </h1>
            <p class="text-sm text-clay-600 mt-1">Motor de Geometria de Placas</p>
        </div>

        <div class="p-6 flex-1 overflow-y-auto">
            <!-- Seleção de Forma -->
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Forma Desejada</label>
                <div class="space-y-2" id="shape-selector">
                    <!-- Gerado via JS -->
                </div>
            </div>

            <!-- Parâmetros Dinâmicos -->
            <div class="mb-6 border-t border-clay-100 pt-6">
                <h2 class="text-sm font-semibold text-gray-700 mb-4 flex items-center gap-2">
                    <i class="ph ph-sliders-horizontal text-lg"></i>
                    Ajustes (cm)
                </h2>
                <div id="parameters-container" class="space-y-5">
                    <!-- Sliders gerados via JS -->
                </div>
            </div>
        </div>

        <div class="p-6 bg-clay-50 border-t border-clay-200">
            <button onclick="window.print()" class="w-full bg-clay-700 hover:bg-clay-800 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition duration-200">
                <i class="ph ph-printer text-xl"></i>
                Imprimir Molde (1:1)
            </button>
            <p class="text-xs text-center text-clay-500 mt-2">Requer impressora configurada para escala 100%.</p>
        </div>
    </aside>

    <!-- ÁREA PRINCIPAL (Preview) - Oculta na impressão -->
    <main class="flex-1 flex flex-col h-full relative no-print bg-clay-100/50">
        
        <!-- Header Recomendação Papel -->
        <div class="p-4 bg-white shadow-sm flex items-center justify-between border-b border-clay-200">
            <div class="flex items-center gap-3">
                <div class="bg-blue-100 text-blue-700 p-2 rounded-full">
                    <i class="ph ph-scroll text-xl"></i>
                </div>
                <div>
                    <p class="text-xs text-gray-500 font-medium uppercase tracking-wider">Tamanho Total</p>
                    <p class="font-bold" id="total-dimensions">0.0 cm x 0.0 cm</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-500 font-medium uppercase tracking-wider">Recomendação de Papel</p>
                <p class="font-bold text-emerald-600" id="paper-recommendation">A4</p>
            </div>
        </div>

        <!-- Área do Canvas SVG (Preview Responsivo) -->
        <div class="flex-1 p-8 overflow-hidden flex items-center justify-center relative">
            <!-- Grid de fundo visual -->
            <div class="absolute inset-0 pointer-events-none opacity-20" style="background-size: 20px 20px; background-image: linear-gradient(to right, #ccc 1px, transparent 1px), linear-gradient(to bottom, #ccc 1px, transparent 1px);"></div>
            
            <div class="bg-white shadow-md border border-gray-200 rounded-sm p-4 w-full h-full max-w-4xl max-h-full flex items-center justify-center relative z-0">
                <div id="preview-svg-container" class="w-full h-full flex items-center justify-center">
                    <!-- SVG será injetado aqui. Adaptável à div. -->
                </div>
            </div>
        </div>
    </main>

    <!-- ÁREA DE IMPRESSÃO (Print Engine) -->
    <div id="print-area" class="print-only">
        <!-- Conteúdo será injetado pelo Motor de Paginação JS -->
    </div>

    <!-- CÓDIGO DO MOTOR JAVASCRIPT -->
    <script>
        // --- 1. CONFIGURAÇÕES DAS FORMAS ---
        const shapes = {
            cylinder: {
                id: 'cylinder',
                name: 'Cilindro (Copo/Xícara)',
                icon: 'ph-cylinder',
                params: {
                    d: { label: 'Diâmetro', min: 4, max: 30, val: 8, step: 0.5 },
                    h: { label: 'Altura', min: 4, max: 40, val: 10, step: 0.5 }
                },
                generator: getCylinderSVG
            },
            box: {
                id: 'box',
                name: 'Caixa Quadrada/Retangular',
                icon: 'ph-cube',
                params: {
                    w: { label: 'Largura', min: 4, max: 40, val: 10, step: 0.5 },
                    l: { label: 'Profundidade', min: 4, max: 40, val: 10, step: 0.5 },
                    h: { label: 'Altura', min: 2, max: 30, val: 5, step: 0.5 }
                },
                generator: getBoxSVG
            },
            cone: {
                id: 'cone',
                name: 'Vaso Cônico (Curvo)',
                icon: 'ph-martini',
                params: {
                    dTop: { label: 'Diâmetro Topo', min: 2, max: 30, val: 12, step: 0.5 },
                    dBot: { label: 'Diâmetro Base', min: 2, max: 30, val: 6, step: 0.5 },
                    h: { label: 'Altura', min: 5, max: 40, val: 15, step: 0.5 }
                },
                generator: getConeSVG
            },
            bowl: {
                id: 'bowl',
                name: 'Tigela Bojuda (Pences)',
                icon: 'ph-cooking-pot',
                params: {
                    d: { label: 'Diâmetro do Disco', min: 10, max: 50, val: 25, step: 0.5 },
                    darts: { label: 'Qtd. de Pences (Cortes)', min: 3, max: 12, val: 6, step: 1 },
                    depth: { label: 'Profundidade do Corte', min: 1, max: 15, val: 5, step: 0.5 },
                    dartWidth: { label: 'Abertura do Corte (Borda)', min: 1, max: 10, val: 4, step: 0.1 }
                },
                generator: getDartBowlSVG
            },
            organic: {
                id: 'organic',
                name: 'Vaso Orgânico (Ondas)',
                icon: 'ph-wave-sine',
                params: {
                    d: { label: 'Diâmetro Base', min: 4, max: 30, val: 10, step: 0.5 },
                    hMax: { label: 'Altura Máxima', min: 10, max: 40, val: 20, step: 0.5 },
                    hMin: { label: 'Altura Mínima', min: 2, max: 30, val: 12, step: 0.5 },
                    waves: { label: 'Nº de Ondas', min: 1, max: 12, val: 3, step: 1 }
                },
                generator: getOrganicSVG
            }
        };

        let currentShape = 'cylinder';

        // --- 2. MOTORES MATEMÁTICOS DE GEOMETRIA SVG ---
        // CRÍTICO: Todas as tags <g> retornadas usam stroke-linejoin="round" e stroke-linecap="round"

        function getCylinderSVG(p) {
            const w = p.d * Math.PI;
            const r = p.d / 2;
            const totalW = Math.max(w, p.d);
            const totalH = p.h + p.d + 1; // 1cm de espaçamento
            
            const rectX = (totalW - w) / 2;
            const cx = totalW / 2;
            const cyCirc = p.h + 1 + r;

            const svg = `
                <g stroke="black" stroke-width="0.05" fill="none" stroke-linejoin="round" stroke-linecap="round">
                    <rect x="${rectX}" y="0" width="${w}" height="${p.h}" />
                    <text x="${rectX + w/2}" y="${p.h/2}" font-family="sans-serif" font-size="0.8" fill="#999" stroke="none" text-anchor="middle" dominant-baseline="middle">Parede</text>
                    <circle cx="${cx}" cy="${cyCirc}" r="${r}" />
                    <text x="${cx}" y="${cyCirc}" font-family="sans-serif" font-size="0.8" fill="#999" stroke="none" text-anchor="middle" dominant-baseline="middle">Base Ø${p.d}</text>
                </g>
            `;
            return { svg, w: totalW, h: totalH };
        }

        function getBoxSVG(p) {
            const totalW = p.w + 2 * p.h;
            const totalH = p.l + 2 * p.h;

            const svg = `
                <g stroke="black" stroke-width="0.05" fill="none" stroke-linejoin="round" stroke-linecap="round">
                    <!-- Contorno Externo -->
                    <path d="M ${p.h} 0 L ${p.h+p.w} 0 L ${p.h+p.w} ${p.h} L ${totalW} ${p.h} L ${totalW} ${p.h+p.l} L ${p.h+p.w} ${p.h+p.l} L ${p.h+p.w} ${totalH} L ${p.h} ${totalH} L ${p.h} ${p.h+p.l} L 0 ${p.h+p.l} L 0 ${p.h} L ${p.h} ${p.h} Z" />
                    <!-- Linhas de Dobra (Tracejadas) -->
                    <line x1="${p.h}" y1="${p.h}" x2="${p.h+p.w}" y2="${p.h}" stroke-dasharray="0.3, 0.3" />
                    <line x1="${p.h}" y1="${p.h+p.l}" x2="${p.h+p.w}" y2="${p.h+p.l}" stroke-dasharray="0.3, 0.3" />
                    <line x1="${p.h}" y1="${p.h}" x2="${p.h}" y2="${p.h+p.l}" stroke-dasharray="0.3, 0.3" />
                    <line x1="${p.h+p.w}" y1="${p.h}" x2="${p.h+p.w}" y2="${p.h+p.l}" stroke-dasharray="0.3, 0.3" />
                    <text x="${p.h + p.w/2}" y="${p.h + p.l/2}" font-family="sans-serif" font-size="0.8" fill="#999" stroke="none" text-anchor="middle" dominant-baseline="middle">Fundo</text>
                </g>
            `;
            return { svg, w: totalW, h: totalH };
        }

        function getConeSVG(p) {
            // Fallback para cilindro se a diferença for muito pequena
            if (Math.abs(p.dTop - p.dBot) < 0.1) return getCylinderSVG({d: (p.dTop+p.dBot)/2, h: p.h});

            let rTop = p.dTop / 2;
            let rBot = p.dBot / 2;
            let invert = false;
            if (rTop > rBot) {
                [rTop, rBot] = [rBot, rTop];
                invert = true;
            }

            // Teorema de Pitágoras para Hipotenusa (lateral)
            const s = Math.sqrt(Math.pow(rBot - rTop, 2) + Math.pow(p.h, 2));
            const R_top = s * rTop / (rBot - rTop);
            const R_bot = R_top + s;
            const theta = (rBot * 2 * Math.PI) / R_bot; // Radianos

            const startAngle = Math.PI / 2 - theta / 2;
            const endAngle = Math.PI / 2 + theta / 2;

            function p2c(cx, cy, r, angle) { return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) }; }

            // Calcular Bounding Box
            const pt1 = p2c(0, 0, R_bot, startAngle);
            const pt2 = p2c(0, 0, R_bot, endAngle);
            const pt3 = p2c(0, 0, R_top, startAngle);
            const pt4 = p2c(0, 0, R_top, endAngle);
            const pApex = { x: 0, y: R_bot };

            const xs = [pt1.x, pt2.x, pt3.x, pt4.x];
            const ys = [pt1.y, pt2.y, pt3.y, pt4.y];
            if (theta > 0) ys.push(pApex.y);

            const minX = Math.min(...xs); const maxX = Math.max(...xs);
            const minY = Math.min(...ys); const maxY = Math.max(...ys);

            const frustumW = maxX - minX;
            const frustumH = maxY - minY;

            // Offset para o SVG (transformar coordenadas para positivas)
            const cx = -minX;
            const cy = -minY;

            const tStart = p2c(cx, cy, R_top, startAngle);
            const tEnd = p2c(cx, cy, R_top, endAngle);
            const bStart = p2c(cx, cy, R_bot, startAngle);
            const bEnd = p2c(cx, cy, R_bot, endAngle);

            const largeArc = theta > Math.PI ? "1" : "0";

            let pathD = `M ${tStart.x} ${tStart.y} `;
            pathD += `A ${R_top} ${R_top} 0 ${largeArc} 1 ${tEnd.x} ${tEnd.y} `;
            pathD += `L ${bEnd.x} ${bEnd.y} `;
            pathD += `A ${R_bot} ${R_bot} 0 ${largeArc} 0 ${bStart.x} ${bStart.y} Z`;

            // Base física associada
            const baseR = invert ? rTop : rBot; 
            const totalW = Math.max(frustumW, baseR * 2);
            const totalH = frustumH + 1 + baseR * 2;
            const baseCx = totalW / 2;
            const baseCy = frustumH + 1 + baseR;
            
            // Centralizar frustum se necessário
            const offsetX = (totalW - frustumW) / 2;

            const svg = `
                <g stroke="black" stroke-width="0.05" fill="none" stroke-linejoin="round" stroke-linecap="round">
                    <g transform="translate(${offsetX}, 0)">
                        <path d="${pathD}" />
                        <text x="0" y="${-minY + frustumH/2}" font-family="sans-serif" font-size="0.8" fill="#999" stroke="none" text-anchor="middle" dominant-baseline="middle">Parede Curva</text>
                    </g>
                    <circle cx="${baseCx}" cy="${baseCy}" r="${baseR}" />
                    <text x="${baseCx}" y="${baseCy}" font-family="sans-serif" font-size="0.8" fill="#999" stroke="none" text-anchor="middle" dominant-baseline="middle">Base Ø${baseR*2}</text>
                </g>
            `;
            return { svg, w: totalW, h: totalH };
        }

        function getDartBowlSVG(p) {
            const R = p.d / 2;
            const cx = R;
            const cy = R;
            
            // Prevenção de quebra geométrica
            const depth = Math.min(p.depth, R - 0.5); 
            const innerR = R - depth;

            let pathD = "";
            for (let i = 0; i < p.darts; i++) {
                const angle = (i * 2 * Math.PI) / p.darts;
                // Prevenir que o dart seja mais largo que a circunferência disponível
                const maxDartW = (R * 2 * Math.PI) / p.darts - 0.1;
                const safeDartW = Math.min(p.dartWidth, maxDartW);
                const delta = (safeDartW / 2) / R; 

                const a1 = angle - delta;
                const a2 = angle + delta;

                const pInner = { x: cx + innerR * Math.cos(angle), y: cy + innerR * Math.sin(angle) };
                const pEdge1 = { x: cx + R * Math.cos(a1), y: cy + R * Math.sin(a1) };
                const pEdge2 = { x: cx + R * Math.cos(a2), y: cy + R * Math.sin(a2) };

                if (i === 0) {
                    pathD += `M ${pEdge2.x} ${pEdge2.y} `;
                } else {
                    pathD += `A ${R} ${R} 0 0 1 ${pEdge1.x} ${pEdge1.y} `;
                    pathD += `L ${pInner.x} ${pInner.y} L ${pEdge2.x} ${pEdge2.y} `;
                }

                if (i === p.darts - 1) {
                    const firstA = 0 - delta;
                    const pFirst1 = { x: cx + R * Math.cos(firstA), y: cy + R * Math.sin(firstA) };
                    pathD += `A ${R} ${R} 0 0 1 ${pFirst1.x} ${pFirst1.y} `;
                    const pFirstInner = { x: cx + innerR * Math.cos(0), y: cy + innerR * Math.sin(0) };
                    pathD += `L ${pFirstInner.x} ${pFirstInner.y} Z`;
                }
            }

            const svg = `
                <g stroke="black" stroke-width="0.05" fill="none" stroke-linejoin="round" stroke-linecap="round">
                    <path d="${pathD}" />
                    <circle cx="${cx}" cy="${cy}" r="${innerR}" stroke-dasharray="0.3,0.3" />
                    <text x="${cx}" y="${cy}" font-family="sans-serif" font-size="0.8" fill="#999" stroke="none" text-anchor="middle" dominant-baseline="middle">Fundo Ø${innerR*2}</text>
                </g>
            `;
            return { svg, w: p.d, h: p.d };
        }

        function getOrganicSVG(p) {
            const w = p.d * Math.PI;
            const r = p.d / 2;
            const totalW = Math.max(w, p.d);
            const totalH = p.hMax + r * 2 + 1;

            const offsetX = (totalW - w) / 2;
            const segments = 200; // Alta resolução para a curva ser suave
            let pathD = `M ${offsetX} ${p.hMax} L ${offsetX + w} ${p.hMax} `;

            // Garantir que hMin não exceda hMax
            const minHeight = Math.min(p.hMin, p.hMax);
            const amplitude = (p.hMax - minHeight) / 2;

            for (let i = 0; i <= segments; i++) {
                const x = w - (i / segments) * w;
                // Cosseno para criar as ondas no topo
                const waveY = amplitude * (1 - Math.cos(p.waves * 2 * Math.PI * (w - x) / w));
                const y = p.hMax - minHeight - waveY;
                pathD += `L ${x + offsetX} ${y} `;
            }
            pathD += `Z`;

            const cx = totalW / 2;
            const cy = p.hMax + 1 + r;

            const svg = `
                <g stroke="black" stroke-width="0.05" fill="none" stroke-linejoin="round" stroke-linecap="round">
                    <path d="${pathD}" />
                    <text x="${cx}" y="${p.hMax/2}" font-family="sans-serif" font-size="0.8" fill="#999" stroke="none" text-anchor="middle" dominant-baseline="middle">Parede Orgânica</text>
                    <circle cx="${cx}" cy="${cy}" r="${r}" />
                    <text x="${cx}" y="${cy}" font-family="sans-serif" font-size="0.8" fill="#999" stroke="none" text-anchor="middle" dominant-baseline="middle">Base Ø${p.d}</text>
                </g>
            `;
            return { svg, w: totalW, h: totalH };
        }


        // --- 3. GESTÃO DE UI E ESTADO ---

        function initUI() {
            const shapeSel = document.getElementById('shape-selector');
            Object.keys(shapes).forEach(key => {
                const s = shapes[key];
                const checked = key === currentShape ? 'checked' : '';
                const activeClass = key === currentShape ? 'border-clay-600 bg-clay-50 ring-1 ring-clay-600' : 'border-gray-200 hover:border-clay-400';
                
                const label = document.createElement('label');
                label.className = `cursor-pointer flex items-center p-3 border rounded-lg transition-all ${activeClass}`;
                label.innerHTML = `
                    <input type="radio" name="shape" value="${key}" class="hidden" ${checked} onchange="changeShape('${key}')">
                    <i class="ph ${s.icon} text-2xl mr-3 text-clay-700"></i>
                    <span class="font-medium text-sm">${s.name}</span>
                `;
                shapeSel.appendChild(label);
            });
            buildSliders();
        }

        function changeShape(shapeId) {
            currentShape = shapeId;
            // Refazer visual dos botões de seleção
            const labels = document.querySelectorAll('#shape-selector label');
            labels.forEach(l => {
                const radio = l.querySelector('input');
                if (radio.value === currentShape) {
                    l.className = `cursor-pointer flex items-center p-3 border rounded-lg transition-all border-clay-600 bg-clay-50 ring-1 ring-clay-600`;
                } else {
                    l.className = `cursor-pointer flex items-center p-3 border rounded-lg transition-all border-gray-200 hover:border-clay-400`;
                }
            });
            buildSliders();
        }

        function buildSliders() {
            const container = document.getElementById('parameters-container');
            container.innerHTML = '';
            
            const params = shapes[currentShape].params;
            Object.keys(params).forEach(key => {
                const p = params[key];
                const isCm = key !== 'waves' && key !== 'darts'; // Unidades
                const unit = isCm ? 'cm' : '';
                
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-xs font-semibold text-gray-600">${p.label}</label>
                        <span class="text-xs font-mono bg-white px-2 py-0.5 rounded border border-gray-200" id="val-${key}">${p.val} ${unit}</span>
                    </div>
                    <input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.val}" 
                           class="w-full h-2 bg-clay-200 rounded-lg appearance-none cursor-pointer accent-clay-600"
                           oninput="updateParam('${key}', this.value)">
                `;
                container.appendChild(div);
            });
            renderSVG();
        }

        function updateParam(key, value) {
            shapes[currentShape].params[key].val = parseFloat(value);
            const isCm = key !== 'waves' && key !== 'darts';
            document.getElementById(`val-${key}`).innerText = `${value} ${isCm ? 'cm' : ''}`;
            renderSVG();
        }

        // --- 4. RENDERIZAÇÃO E RECOMENDAÇÃO DE PAPEL ---

        const paperSizes = [
            { name: "1 Folha A4", w: 21, h: 29.7 },
            { name: "1 Folha A3", w: 29.7, h: 42 },
            { name: "1 Folha A2", w: 42, h: 59.4 },
            { name: "1 Folha A1", w: 59.4, h: 84.1 },
            { name: "1 Folha A0", w: 84.1, h: 118.9 }
        ];

        function getPaperRecommendation(tw, th) {
            // Necessitamos de ~1cm de margem extra no SVG total para não cortar bordas na impressão
            const reqW = tw + 1;
            const reqH = th + 1;
            
            for (let p of paperSizes) {
                // Testa modo retrato ou paisagem
                if ((reqW <= p.w && reqH <= p.h) || (reqW <= p.h && reqH <= p.w)) {
                    return p.name;
                }
            }
            return "Rolo / Formato Especial";
        }

        function renderSVG() {
            const shapeObj = shapes[currentShape];
            // Construir objeto de valores simplificado para as funções matemáticas
            const pValues = {};
            Object.keys(shapeObj.params).forEach(k => pValues[k] = shapeObj.params[k].val);
            
            const result = shapeObj.generator(pValues);
            const padding = 1; // Espaço de respiro (viewBox)
            
            // 1. Atualizar UI de Texto
            document.getElementById('total-dimensions').innerText = `${result.w.toFixed(1)} cm x ${result.h.toFixed(1)} cm`;
            document.getElementById('paper-recommendation').innerText = getPaperRecommendation(result.w, result.h);

            // 2. SVG Responsivo para Ecrã (Screen Preview)
            // viewBox com folga para a espessura da linha não cortar
            const viewBox = `-0.5 -0.5 ${result.w + 1} ${result.h + 1}`;
            const previewSVG = `
                <svg viewBox="${viewBox}" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
                    ${result.svg}
                </svg>
            `;
            document.getElementById('preview-svg-container').innerHTML = previewSVG;

            // 3. Sistema Profissional de Paginação para Impressão (Poster Print Engine)
            // Resolve o problema de navegadores cortarem SVGs muito grandes e não paginarem horizontalmente
            const PAGE_W = 19; // 21cm (A4) - 2cm de margem física
            const PAGE_H = 27.7; // 29.7cm (A4) - 2cm de margem física
            
            const totalW = result.w + 1;
            const totalH = result.h + 1;

            const cols = Math.ceil(totalW / PAGE_W);
            const rows = Math.ceil(totalH / PAGE_H);
            const totalPages = cols * rows;

            // Obter lista de parâmetros como string
            const paramsListHTML = Object.keys(shapeObj.params)
                .map(k => `<li>${shapeObj.params[k].label}: <strong>${shapeObj.params[k].val}</strong></li>`)
                .join('');

            // Página 1: Instruções e Régua
            let printHTML = `
                <div class="print-page">
                    <h1 style="font-size: 22pt; margin-bottom: 5px; font-family: sans-serif;">Molde 1:1 - ${shapeObj.name}</h1>
                    <p style="font-size: 12pt; color: #555; font-family: sans-serif; margin-top:0;">Desenho técnico para corte em placa de argila.</p>
                    
                    <div style="margin-top: 30px; border: 2px solid black; padding: 15px; font-family: sans-serif;">
                        <h2 style="font-size: 14pt; margin-top: 0; color: #b91c1c;">⚠️ CONFIRME ANTES DE IMPRIMIR</h2>
                        <ul style="font-size: 12pt; padding-left: 20px; line-height: 1.6;">
                            <li>Defina a <strong>Escala = 100%</strong> ou <strong>"Tamanho Real"</strong> nas definições de impressão.</li>
                            <li>NÃO use a opção "Ajustar à Página" nem "Encolher".</li>
                            <li>Formato alvo: <strong>A4</strong></li>
                            <li>Total de páginas a colar: <strong>${totalPages} pág.</strong></li>
                        </ul>
                    </div>

                    <div style="margin-top: 30px; font-family: sans-serif;">
                        <p style="font-size: 11pt; margin-bottom: 5px;"><strong>RÉGUA DE VERIFICAÇÃO:</strong> Meça a caixa abaixo no papel impresso. Deve medir exatos 5cm.</p>
                        <div style="width: 5cm; height: 1cm; border: 1px solid black; position: relative; box-sizing: border-box;">
                            <div style="position: absolute; left: 1cm; top: 0; height: 100%; border-left: 1px solid black;"></div>
                            <div style="position: absolute; left: 2cm; top: 0; height: 100%; border-left: 1px solid black;"></div>
                            <div style="position: absolute; left: 3cm; top: 0; height: 100%; border-left: 1px solid black;"></div>
                            <div style="position: absolute; left: 4cm; top: 0; height: 100%; border-left: 1px solid black;"></div>
                            <span style="position: absolute; right: 2px; bottom: 2px; font-size: 8pt;">5cm</span>
                        </div>
                    </div>

                    <div style="margin-top: 30px; font-family: sans-serif;">
                        <h3 style="font-size: 12pt; border-bottom: 1px solid #ccc; padding-bottom: 5px;">Parâmetros Utilizados:</h3>
                        <ul style="font-size: 11pt; line-height: 1.6; padding-left: 20px;">
                            ${paramsListHTML}
                        </ul>
                    </div>
                </div>
            `;

            // Páginas Seguintes: Grelha do Molde (Poster Tiling)
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    // Calcula o recorte matemático do SVG para esta folha específica
                    const startX = -0.5 + c * PAGE_W;
                    const startY = -0.5 + r * PAGE_H;
                    const tileViewBox = `${startX} ${startY} ${PAGE_W} ${PAGE_H}`;
                    
                    printHTML += `
                        <div class="print-page">
                            <div style="position:absolute; top: 0.5cm; left: 1cm; font-size: 8pt; color: #888; font-family: sans-serif;">
                                Cerâmica Pro | Pág ${r * cols + c + 1} de ${totalPages} | Col ${c+1}, Linha ${r+1}
                            </div>
                            <!-- Área de desenho com tracejado claro para guiar o corte/colagem -->
                            <div style="position:absolute; top: 1cm; left: 1cm; width: 19cm; height: 27.7cm; border: 1px dashed #e5e7eb; box-sizing: border-box;">
                                <svg width="19cm" height="27.7cm" viewBox="${tileViewBox}" xmlns="http://www.w3.org/2000/svg" style="display:block;">
                                    ${result.svg}
                                </svg>
                            </div>
                        </div>
                    `;
                }
            }

            document.getElementById('print-area').innerHTML = printHTML;
        }

        // Iniciar aplicação
        window.onload = () => {
            initUI();
        };
    </script>
</body>
</html>
